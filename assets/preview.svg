<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Three Body Stellar Dynamics preview</title>
  <desc id="desc">A stylized preview of three glowing stars orbiting in a nebula-filled space scene.</desc>
  <defs>
    <radialGradient id="bg" cx="45%" cy="48%" r="75%">
      <stop offset="0%" stop-color="#10243a"/>
      <stop offset="55%" stop-color="#071020"/>
      <stop offset="100%" stop-color="#02040a"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#79e0ff"/>
      <stop offset="100%" stop-color="#79e0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="22%" stop-color="#ffcf7b"/>
      <stop offset="100%" stop-color="#ffcf7b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pinkGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="22%" stop-color="#ff6f9d"/>
      <stop offset="100%" stop-color="#ff6f9d" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="310" cy="160" r="170" fill="#356fb2" opacity="0.18" filter="url(#blur)"/>
  <circle cx="760" cy="260" r="210" fill="#a54f9a" opacity="0.2" filter="url(#blur)"/>
  <circle cx="955" cy="410" r="170" fill="#35b5a6" opacity="0.14" filter="url(#blur)"/>
  <g fill="#dce9ff" opacity="0.8">
    <circle cx="96" cy="91" r="2"/>
    <circle cx="185" cy="438" r="1.6"/>
    <circle cx="274" cy="282" r="1.4"/>
    <circle cx="422" cy="81" r="1.8"/>
    <circle cx="522" cy="520" r="2.2"/>
    <circle cx="654" cy="112" r="1.5"/>
    <circle cx="784" cy="492" r="2"/>
    <circle cx="921" cy="100" r="1.7"/>
    <circle cx="1096" cy="374" r="1.9"/>
    <circle cx="1135" cy="158" r="1.3"/>
  </g>
  <path d="M367 348 C470 215 651 214 742 332 C639 425 480 431 367 348 Z" fill="none" stroke="#79e0ff" stroke-width="4" opacity="0.58"/>
  <path d="M407 314 C548 456 720 394 771 230 C604 245 473 215 407 314 Z" fill="none" stroke="#ffcf7b" stroke-width="4" opacity="0.46"/>
  <path d="M476 225 C520 420 720 480 829 326 C704 177 548 140 476 225 Z" fill="none" stroke="#ff6f9d" stroke-width="4" opacity="0.46"/>
  <circle cx="410" cy="320" r="78" fill="url(#blueGlow)"/>
  <circle cx="410" cy="320" r="16" fill="#bdf4ff"/>
  <circle cx="660" cy="380" r="86" fill="url(#goldGlow)"/>
  <circle cx="660" cy="380" r="18" fill="#ffd891"/>
  <circle cx="805" cy="250" r="88" fill="url(#pinkGlow)"/>
  <circle cx="805" cy="250" r="18" fill="#ff8fb0"/>
  <rect x="52" y="52" width="430" height="144" rx="10" fill="#060b14" opacity="0.5"/>
  <text x="78" y="116" fill="#eef6ff" font-family="Inter, Segoe UI, sans-serif" font-size="44" font-weight="800">Three Body</text>
  <text x="78" y="162" fill="#eef6ff" font-family="Inter, Segoe UI, sans-serif" font-size="44" font-weight="800">Stellar Dynamics</text>
  <rect x="832" y="430" width="300" height="116" rx="8" fill="#080d17" opacity="0.78" stroke="#26364a"/>
  <text x="862" y="477" fill="#9fb0c6" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700">KNOWN CATALOG</text>
  <text x="862" y="514" fill="#eef6ff" font-family="Inter, Segoe UI, sans-serif" font-size="28" font-weight="800">Stars, planets,</text>
  <text x="862" y="546" fill="#eef6ff" font-family="Inter, Segoe UI, sans-serif" font-size="28" font-weight="800">galaxies, black holes</text>
