name: Static check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JavaScript syntax inside index.html
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const html = fs.readFileSync("index.html", "utf8");
          const match = html.match(/<script>([\s\S]*)<\/script>/);
          if (!match) throw new Error("No inline script found in index.html");
          new Function(match[1]);
          console.log("index.html script syntax ok");
          NODE
